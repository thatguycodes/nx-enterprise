name: Cleanup Stale Token Sync PRs

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  cleanup-stale-prs:
    name: Close Stale Token Sync PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find Stale PRs
        id: find_stale
        run: |
          # Find open PRs on tokens/figma-sync branch that are 7+ days old
          STALE_PRS=$(gh pr list \
            --head tokens/figma-sync \
            --base main \
            --state open \
            --search "created:<$(date -d '7 days ago' +'%Y-%m-%d')" \
            --json number,createdAt,title \
            --jq '.[] | "\(.number)"' \
            2>/dev/null || echo "")

          if [ -z "$STALE_PRS" ]; then
            echo "found_stale=false" >> $GITHUB_OUTPUT
            echo "No stale PRs found"
          else
            echo "found_stale=true" >> $GITHUB_OUTPUT
            echo "stale_prs=$STALE_PRS" >> $GITHUB_OUTPUT
            echo "Stale PRs found: $STALE_PRS"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Stale PRs
        if: steps.find_stale.outputs.found_stale == 'true'
        run: |
          IFS=$'\n' read -rd '' -a PR_NUMBERS <<<"${{ steps.find_stale.outputs.stale_prs }}" || true

          for PR_NUMBER in "${PR_NUMBERS[@]}"; do
            if [ -n "$PR_NUMBER" ]; then
              CREATED_AT=$(gh pr view "$PR_NUMBER" --json createdAt --jq '.createdAt')

              gh pr close "$PR_NUMBER" \
                --comment "🧹 **Auto-closed stale PR**

              This PR was open for more than 7 days without being merged. To maintain a clean workflow and prevent conflicts, stale token sync PRs are automatically closed.

              ## What does this mean?

              Per the token sync policy:
              - ✅ **Merge before next sync**: Token changes must be merged before the next Figma sync is triggered
              - 🔄 **Auto-close policy**: PRs older than 7 days are closed to prevent conflicts

              ## Next steps

              If you still need these token changes:
              1. Trigger a new Figma sync from the [Actions tab](../../actions/workflows/figma-token-sync.yml)
              2. A fresh PR will be created with the latest Figma tokens

              **Created**: $CREATED_AT
              **Closed by**: Automated stale PR cleanup"

              echo "✅ Closed PR #$PR_NUMBER (created $CREATED_AT)"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Stale PR Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.find_stale.outputs.found_stale }}" = "true" ]; then
            echo "✅ **Closed stale PRs**: ${{ steps.find_stale.outputs.stale_prs }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No stale PRs found**" >> $GITHUB_STEP_SUMMARY
          fi

