name: Token Import (On-Demand)

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name suffix for the sync PR (default: auto-generated)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  import-tokens:
    name: Build & PR Design Tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --ignore-scripts

      - name: Check for Existing Open PR
        id: check_pr
        run: |
          PR_NUMBER=$(gh pr list \
            --head tokens/plugin-import \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' \
            2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "pr_number=" >> $GITHUB_OUTPUT
          else
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "Found open PR: #$PR_NUMBER"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Existing PR
        if: steps.check_pr.outputs.pr_number != ''
        run: |
          gh pr close ${{ steps.check_pr.outputs.pr_number }} \
            --comment "🔄 New import triggered. Closing stale PR in favour of a fresh build."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Git Commit Hash
        id: commit_hash
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Current commit: $COMMIT_HASH"

      - name: Build Tokens
        run: npx nx run design-tokens:generate

      - name: Check for Changes
        id: check_changes
        run: |
          if git diff --quiet libs/tokens/design-tokens/src/generated/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No generated token changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Generated token changes detected"
          fi

      - name: Configure Git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "design-automation[bot]"
          git config user.email "design-automation@users.noreply.github.com"

      - name: Create Commit
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add libs/tokens/design-tokens/src/generated/

          COMMIT_MSG="chore(tokens): rebuild generated tokens

          Rebuilt at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Git commit hash: ${{ steps.commit_hash.outputs.hash }}"

          git commit -m "$COMMIT_MSG"

      - name: Push to tokens/plugin-import Branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push --force origin HEAD:tokens/plugin-import
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          PR_BODY="# 🎨 Design Token Build

          **Source**: Manually updated \`core.json\` / \`semantic.json\` (exported from Figma plugin)
          **Triggered**: On-demand workflow
          **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ## Audit Trail

          **Git Commit Hash**: \`${{ steps.commit_hash.outputs.hash }}\`
          \`\`\`
          $(git show --format=fuller -s)
          \`\`\`

          ## Changes

          - Rebuilt CSS variables and TypeScript constants from updated token source files

          ## Instructions

          1. **Review the changes** in the Files tab
          2. **Approve and merge** when ready

          > ⚠️ **Merge before the next build**: A new run of this workflow will close this PR.
          "

          PR_URL=$(gh pr create \
            --head tokens/plugin-import \
            --base main \
            --title "🎨 Design Token Build - $(date +%Y-%m-%d\ %H:%M)" \
            --body "$PR_BODY" \
            --draft=false \
            2>&1)

          echo "PR created: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ **Changes detected and PR created**" >> $GITHUB_STEP_SUMMARY
            echo "- Git commit: ${{ steps.commit_hash.outputs.hash }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No generated changes** — token source files are already in sync" >> $GITHUB_STEP_SUMMARY
          fi
